<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fusion World DB - Collector Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f1a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .sticky-header { position: sticky; top: 0; z-index: 50; background: #0b0f1a; padding-bottom: 1rem; border-bottom: 1px solid #1e293b; }
        .table-row { border-bottom: 1px solid #1e293b; transition: all 0.2s; border-left: 4px solid transparent; }
        .table-row:hover { background: #1e293b; }
        .row-owned { background: rgba(251, 191, 36, 0.08) !important; border-left: 4px solid #fbbf24 !important; }
        
        .set-fb { color: #60a5fa; } 
        .set-sb { color: #c084fc; } 
        .set-fs { color: #f87171; } 
        .set-promo { color: #34d399; } 
        .set-energy { color: #fbbf24; } 

        .rare-scr { color: #f59e0b; text-shadow: 0 0 8px rgba(245, 158, 11, 0.5); font-weight: 800; }
        .rare-sr { color: #e2e8f0; font-weight: 700; text-shadow: 0 0 5px rgba(255, 255, 255, 0.3); }
        .rare-r { color: #3b82f6; font-weight: 600; }
        .rare-uc { color: #10b981; font-weight: 600; }
        .rare-c { color: #94a3b8; }
        .rare-l { color: #a855f7; font-weight: 800; text-transform: uppercase; }
        .rare-aa { color: #ec4899; font-style: italic; font-weight: 800; text-shadow: 0 0 8px rgba(236, 72, 153, 0.4); }
        .rare-p { color: #22d3ee; font-weight: 700; }
        .rare-st { color: #f87171; font-weight: 700; }
        .rare-energy { color: #fbbf24; font-weight: 700; }

        .nav-btn.active { background-color: #fbbf24 !important; color: #000 !important; opacity: 1 !important; border-color: #fbbf24 !important; }
        
        .qty-btn { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-weight: 900; transition: all 0.1s; user-select: none; cursor: pointer; }
        .qty-btn:active { transform: scale(0.9); }
        .btn-minus { background: #7f1d1d; color: #f87171; border: 1px solid #ef4444; }
        .btn-minus:hover { background: #b91c1c; color: white; }
        .btn-plus { background: #064e3b; color: #34d399; border: 1px solid #10b981; }
        .btn-plus:hover { background: #047857; color: white; }

        .filter-owned-box { display: flex; align-items: center; gap: 8px; background: #1e293b; padding: 0 12px; border-radius: 8px; border: 1px solid #334155; height: 38px; cursor: pointer; }
    </style>
</head>
<body class="p-2 md:p-6">

    <div class="max-w-[1600px] mx-auto">
        <div class="sticky-header">
            <header class="flex flex-col md:flex-row justify-between items-center py-4 gap-4">
                <div>
                    <h1 class="text-3xl font-black text-yellow-500 italic uppercase">Fusion World DB</h1>
                    <div class="flex flex-wrap gap-2 items-center mt-2">
                        <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest text-nowrap mr-2">Collector Edition</p>
                        <button onclick="downloadJSON()" class="bg-blue-600 hover:bg-blue-500 text-white text-[10px] px-3 py-1 rounded-full font-black uppercase shadow-lg transition-all">📥 Scarica</button>
                        <label class="bg-purple-600 hover:bg-purple-500 text-white text-[10px] px-3 py-1 rounded-full font-black uppercase shadow-lg transition-all cursor-pointer">
                            📤 Carica Dati
                            <input type="file" id="upload-input" class="hidden" accept=".json" onchange="uploadJSON(event)">
                        </label>
                        <button onclick="if(confirm('Resettare i dati?')){localStorage.removeItem(LS_KEY); location.reload();}" class="bg-red-900/40 hover:bg-red-800 text-red-400 text-[10px] px-3 py-1 rounded-full font-black uppercase border border-red-800 transition-all">Reset</button>
                    </div>
                </div>
                
                <div class="flex items-center gap-6 bg-slate-900 p-4 rounded-xl border border-slate-800 shadow-xl">
                    <div class="text-center px-4 border-r border-slate-700">
                        <span class="block text-[10px] text-slate-500 font-bold uppercase">Carte Totali</span>
                        <span id="stat-owned" class="text-2xl font-mono text-yellow-500">0</span>
                    </div>
                    <div class="text-center px-4">
                        <span class="block text-[10px] text-slate-500 font-bold uppercase">Valore Totale</span>
                        <span id="stat-value" class="text-2xl font-mono text-green-400">€ 0.00</span>
                    </div>
                </div>

                <div class="flex items-center gap-3 w-full md:w-auto">
                    <label class="filter-owned-box">
                        <input type="checkbox" id="owned-only" onchange="applyFilters()" class="w-4 h-4 accent-yellow-500">
                        <span class="text-[10px] font-bold uppercase text-slate-300">Solo Possedute</span>
                    </label>
                    <input type="text" id="search" placeholder="Cerca codice..." oninput="applyFilters()"
                           class="w-full md:w-64 bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-sm focus:border-yellow-500 outline-none font-bold text-white">
                </div>
            </header>

            <nav class="flex flex-wrap gap-2 mt-2" id="set-tabs">
                <button data-setid="ALL" onclick="switchSet('ALL', this)" class="nav-btn bg-slate-700 px-4 py-1.5 rounded text-[10px] border border-slate-500 font-black transition-all active uppercase">Globale</button>
            </nav>
        </div>

        <div class="mt-6 bg-slate-900 rounded-t-xl border border-slate-800 overflow-hidden">
            <div class="grid grid-cols-4 md:grid-cols-6 lg:grid-cols-7 gap-4 p-4 text-[10px] font-black uppercase tracking-wider text-slate-500 border-b border-slate-800">
                <div class="col-span-1">Carta / Rarità</div>
                <div class="hidden md:block">Versione Art</div>
                <div class="text-center">Quantità</div>
                <div class="text-center">Prezzo (€)</div>
                <div class="text-center">Totale (€)</div>
                <div class="hidden lg:block text-right">Cardmarket</div>
            </div>
        </div>

        <div id="master-list" class="bg-slate-900/50 border-x border-b border-slate-800 rounded-b-xl overflow-hidden mb-20"></div>
    </div>

    <script>
        let storage = {}; 
        const LS_KEY = 'fusion_world_db_v1';

        const DATABASE = [
            { id: "FB01", range: 140, cat: "fb", aaList: [1,2,3,4, 5,15,20,23,25,26,30,31,35,36,51,52,56,65,71,75,76,101,105,131,133,139,140], leaders: [1,2,3,4] }, 
            { id: "FB02", range: 144, cat: "fb", aaList: [1,2,3,4, 15,18,30,31,35,39,52,55,68,70,71,93,101,105,110,115,120,139,140,141,142], leaders: [1,2,3,4] },
            { id: "FB03", range: 144, cat: "fb", aaList: [1,2,3,4, 12,18,22,35,44,52,66,77,88,99,101,105,110,121,130,140,141,142,143,144], leaders: [1,2,3,4] }, 
            { id: "FB04", range: 144, cat: "fb", aaList: [1,2,3,4, 141,142,143,144], leaders: [1,2,3,4] },
            { id: "FB05", range: 144, cat: "fb", aaList: [1,2,3,4, 141,142,143,144], leaders: [1,2,3,4] },
            { id: "FB06", range: 144, cat: "fb", aaList: [1,2,3,4, 119, 108, 141,142,143,144], leaders: [1,2,3,4] },
            { id: "FB07", range: 144, cat: "fb", aaList: [1,2,3,4, 97, 141,142,143,144], leaders: [1,2,3,4, 97] },
            { id: "FB08", range: 144, cat: "fb", aaList: [1,2,3,4, 141,142,143,144], leaders: [1,2,3,4] },
            { id: "FB09", range: 144, cat: "fb", aaList: [1,2,3,4, 141,142,143,144], leaders: [1,2,3,4] },
            { id: "FS01", range: 16, cat: "fs", aaList: [], leaders: [1] }, 
            { id: "FS02", range: 16, cat: "fs", aaList: [], leaders: [1] },
            { id: "FS03", range: 16, cat: "fs", aaList: [], leaders: [1] },
            { id: "FS04", range: 16, cat: "fs", aaList: [1], leaders: [1] },
            { id: "FS05", range: 16, cat: "fs", aaList: [], leaders: [1] },
            { id: "FS06", range: 16, cat: "fs", aaList: [], leaders: [1] },
            { id: "FS07", range: 16, cat: "fs", aaList: [], leaders: [1] },
            { id: "FP", range: 100, cat: "promo", aaList: [], leaders: [] }, 
            { id: "E", range: 90, cat: "energy", aaList: [], leaders: [] }
        ];

        const CAT_STYLE = {
            fb: "bg-blue-900/40 border-blue-700 text-blue-300 hover:bg-blue-800",
            sb: "bg-purple-900/40 border-purple-700 text-purple-300 hover:bg-purple-800",
            fs: "bg-red-900/40 border-red-700 text-red-300 hover:bg-red-800",
            promo: "bg-green-900/40 border-green-700 text-green-300 hover:bg-green-800",
            energy: "bg-amber-900/40 border-amber-700 text-amber-300 hover:bg-amber-800"
        };

        function getRarityInfo(id, isAA, setId) {
            const num = parseInt(id.split('-')[1]);
            const setConfig = DATABASE.find(s => s.id === setId);

            // LOGICA ETICHETTE SOTTO IL CODICE (Sempre basata sulla rarità base)
            let baseRarity = { label: "COMMON", class: "rare-c" };

            if (setId === 'E') {
                if (num >= 70 && num <= 90) baseRarity = { label: "GOLD RARE ★", class: "rare-scr" };
                else if (num >= 42 && num <= 62) baseRarity = { label: "GOLD RARE", class: "rare-scr" };
                else baseRarity = { label: "ENERGY", class: "rare-energy" };
            } else if (setId === "SB01" || setId === "SB02") {
                if (setConfig.leaders.includes(num)) baseRarity = { label: "LEADER", class: "rare-l" };
                else if (setConfig.secList && setConfig.secList.includes(num)) baseRarity = { label: "SECRET", class: "rare-scr" };
                else if (setConfig.srList && setConfig.srList.includes(num)) baseRarity = { label: "SUPER RARE", class: "rare-sr" };
                else if (setConfig.rList && setConfig.rList.includes(num)) baseRarity = { label: "RARE", class: "rare-r" };
                else if (setConfig.ucList && setConfig.ucList.includes(num)) baseRarity = { label: "UNCOMMON", class: "rare-uc" };
            } else if (setId.startsWith('FB')) {
                if ((setId === "FB01" && num === 140) || (setId === "FB06" && num === 119)) baseRarity = { label: "SECRET", class: "rare-scr" };
                else if (setConfig && setConfig.leaders && setConfig.leaders.includes(num)) baseRarity = { label: "LEADER", class: "rare-l" };
                else if (num >= 141) baseRarity = { label: "SECRET", class: "rare-scr" };
                else if (num >= 105) baseRarity = { label: "SUPER RARE", class: "rare-sr" };
                else if (num >= 75) baseRarity = { label: "RARE", class: "rare-r" };
                else if (num >= 45) baseRarity = { label: "UNCOMMON", class: "rare-uc" };
            } else if (setId.startsWith('FS')) {
                baseRarity = num === 1 ? { label: "LEADER", class: "rare-l" } : { label: "ST", class: "rare-st" };
            } else if (setId.startsWith('FP')) {
                baseRarity = { label: "PROMO", class: "rare-p" };
            }

            // SE È UNA VERSIONE ALTERNATIVA (P), MODIFICHIAMO SOLO L'ETICHETTA ART (gestita in addListRow)
            // Ma per SB02-025 (P) forziamo l'etichetta rarità visiva se necessario
            if (isAA && id.includes("SB02-025 (P)")) {
                return { label: "MANGA RARE", class: "rare-scr", isManga: true };
            }

            return baseRarity;
        }

        function init() {
            const tabs = document.getElementById('set-tabs');
            const list = document.getElementById('master-list');
            list.innerHTML = ""; 

            DATABASE.forEach(set => {
                const btn = document.createElement('button');
                btn.className = `nav-btn px-3 py-1.5 rounded text-[10px] border font-bold transition-all opacity-60 hover:opacity-100 ${CAT_STYLE[set.cat]}`;
                btn.innerText = set.id;
                btn.setAttribute('data-setid', set.id);
                btn.onclick = () => switchSet(set.id, btn);
                tabs.appendChild(btn);

                for (let i = 1; i <= set.range; i++) {
                    const padding = (set.id === 'E' || set.id === 'FS04') ? 2 : 3;
                    const baseCode = `${set.id}-${String(i).padStart(padding, '0')}`;
                    
                    // Aggiungi versione Regular
                    addListRow(baseCode, false, set.id, set.cat);
                    
                    // Aggiungi versioni Alternative
                    if (set.aaList && set.aaList.includes(i)) {
                        addListRow(`${baseCode} (P)`, true, set.id, set.cat);
                        // Super Alt Art specifica per SB02-043
                        if(set.id === "SB02" && i === 43) {
                             addListRow(`${baseCode} (SA)`, true, set.id, set.cat);
                        }
                    }
                }
            });
            switchSet("ALL", document.querySelector('[data-setid="ALL"]')); 
            updateStats();
        }

        function addListRow(id, isAA, setId, cat) {
            const list = document.getElementById('master-list');
            const data = storage[id] || { qty: 0, price: "0.00" };
            const rarity = getRarityInfo(id, isAA, setId);
            const div = document.createElement('div');
            div.className = `table-row grid grid-cols-4 md:grid-cols-6 lg:grid-cols-7 gap-4 p-3 items-center text-sm ${data.qty > 0 ? 'row-owned' : ''}`;
            div.dataset.set = setId;
            div.dataset.qty = data.qty;
            div.dataset.cleanCode = id.toLowerCase().replace(/[^a-z0-9]/g, '');
            div.id = `row-${id}`;

            // Gestione etichetta ART (Colonna centrale)
            let artLabel = 'Regular';
            let artClass = 'text-cyan-400 opacity-80';

            if (id.includes("(P)")) {
                if (id.includes("SB02-025")) {
                    artLabel = 'MANGA RARE';
                    artClass = 'text-orange-400 font-black italic';
                } else {
                    artLabel = 'ALT ART (V2)';
                    artClass = 'text-pink-400 italic font-bold';
                }
            } else if (id.includes("(SA)")) {
                artLabel = 'SUPER ALT ART';
                artClass = 'text-pink-500 font-black italic';
            }
            
            let marketCode = id.split(' ')[0]; 

            div.innerHTML = `
                <div class="flex flex-col">
                    <div class="flex items-center gap-2">
                        <span class="w-1.5 h-1.5 rounded-full bg-current set-${cat}"></span>
                        <span class="font-mono font-bold text-slate-200 text-xs">${id}</span>
                    </div>
                    <span class="text-[9px] font-black uppercase tracking-tighter pl-3.5 ${rarity.class}">${rarity.label}</span>
                </div>
                <div class="hidden md:block text-[10px] font-black uppercase ${artClass}">${artLabel}</div>
                <div class="flex items-center justify-center gap-3">
                    <div class="qty-btn btn-minus" onclick="changeQty('${id}', -1)">-</div>
                    <span id="qty-val-${id}" class="w-6 text-center text-yellow-500 font-black font-mono text-base">${data.qty}</span>
                    <div class="qty-btn btn-plus" onclick="changeQty('${id}', 1)">+</div>
                </div>
                <div class="flex justify-center">
                    <input type="number" step="0.01" value="${data.price}" onchange="updatePrice('${id}', this.value)" 
                           class="bg-slate-800 border border-slate-700 rounded w-16 text-center text-green-400 font-bold py-1 text-xs outline-none focus:border-green-500">
                </div>
                <div class="text-center font-mono font-bold text-white" id="total-${id}">€ ${(data.qty * data.price).toFixed(2)}</div>
                <div class="hidden lg:block text-right">
                    <a href="https://www.cardmarket.com/en/DragonBallSuper/Products/Search?searchString=${marketCode}" target="_blank" class="text-blue-400 hover:text-blue-300 text-[10px] font-bold underline decoration-dotted">MARKET ↗</a>
                </div>
            `;
            list.appendChild(div);
        }

        function changeQty(id, delta) {
            if (!storage[id]) storage[id] = { qty: 0, price: "0.00" };
            storage[id].qty = Math.max(0, storage[id].qty + delta);
            document.getElementById(`qty-val-${id}`).innerText = storage[id].qty;
            const row = document.getElementById(`row-${id}`);
            row.dataset.qty = storage[id].qty;
            if (storage[id].qty > 0) row.classList.add('row-owned');
            else row.classList.remove('row-owned');
            const totalPrice = (storage[id].qty * storage[id].price).toFixed(2);
            document.getElementById(`total-${id}`).innerText = `€ ${totalPrice}`;
            saveToLocalStorage(); 
            updateStats();
            applyFilters();
        }

        function updatePrice(id, val) {
            if (!storage[id]) storage[id] = { qty: 0, price: "0.00" };
            const numericVal = parseFloat(val);
            storage[id].price = isNaN(numericVal) ? "0.00" : numericVal.toFixed(2);
            const totalPrice = (storage[id].qty * storage[id].price).toFixed(2);
            document.getElementById(`total-${id}`).innerText = `€ ${totalPrice}`;
            saveToLocalStorage(); 
            updateStats();
        }

        function updateStats() {
            let q = 0, v = 0;
            Object.values(storage).forEach(i => { 
                const qty = parseInt(i.qty) || 0;
                const price = parseFloat(i.price) || 0;
                q += qty; v += (qty * price); 
            });
            document.getElementById('stat-owned').innerText = q;
            document.getElementById('stat-value').innerText = `€ ${v.toFixed(2)}`;
        }

        function switchSet(setId, btn) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            applyFilters();
        }

        function applyFilters() {
            const searchVal = document.getElementById('search').value.toLowerCase().replace(/[^a-z0-9]/g, '');
            const showOnlyOwned = document.getElementById('owned-only').checked;
            const activeBtn = document.querySelector('.nav-btn.active');
            const activeSet = activeBtn ? activeBtn.getAttribute('data-setid') : 'ALL';

            document.querySelectorAll('.table-row').forEach(row => {
                const qty = parseInt(row.dataset.qty) || 0;
                const matchesSearch = searchVal === '' || row.dataset.cleanCode.includes(searchVal);
                const matchesOwned = !showOnlyOwned || qty > 0;
                const matchesSet = activeSet === 'ALL' || row.dataset.set === activeSet;
                row.style.display = (matchesSearch && matchesOwned && matchesSet) ? 'grid' : 'none';
            });
        }

        function downloadJSON() {
            const cleaned = {};
            for (const key in storage) if (storage[key].qty > 0) cleaned[key] = storage[key];
            const blob = new Blob([JSON.stringify(cleaned, null, 4)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url; a.download = "fusion_world_inventory.json"; a.click();
        }

        function uploadJSON(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    storage = JSON.parse(e.target.result);
                    saveToLocalStorage();
                    location.reload();
                } catch (err) { alert("File JSON non valido."); }
            };
            reader.readAsText(file);
        }

        function saveToLocalStorage() {
            localStorage.setItem(LS_KEY, JSON.stringify(storage));
        }

        async function loadDatabase() {
            const savedData = localStorage.getItem(LS_KEY);
            if (savedData) {
                try { storage = JSON.parse(savedData); } catch (e) { storage = {}; }
            }
            init(); 
        }

        loadDatabase();
    </script>
</body>
</html>
